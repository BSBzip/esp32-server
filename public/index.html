<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      margin: 0;
    }
    h1 { color: #00d4ff; margin-bottom: 8px; }
    p  { color: #888; margin-bottom: 40px; }
    .card {
      background: #ffffff11;
      border-radius: 14px;
      padding: 30px;
      width: 100%;
      max-width: 500px;
    }
    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 2px solid #333;
      border-radius: 8px;
      background: #0d0d1a;
      color: white;
      margin-bottom: 14px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #00d4ff; }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      background: #00d4ff;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
    #status {
      margin-top: 16px;
      font-size: 14px;
      color: #888;
      text-align: center;
      min-height: 20px;
    }
    #status.ok  { color: #44ff88; }
    #status.err { color: #ff4455; }
    .log { margin-top: 30px; }
    .log h2 { font-size: 14px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .log-list { list-style: none; padding: 0; margin: 0; }
    .log-list li {
      padding: 8px 12px;
      background: #ffffff08;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 14px;
      color: #ccc;
    }
    .log-list li span { color: #555; font-size: 12px; margin-right: 8px; }
  </style>
</head>
<body>
  <h1>ESP32 Command Center</h1>
  <p>Type a message — the ESP32 will print it to its Serial Monitor</p>

  <div class="card">
    <input type="text" id="msg" placeholder="Type a message..." maxlength="200" />
    <button onclick="send()">Send to ESP32</button>
    <div id="status"></div>

    <div class="log">
      <h2>Sent Messages</h2>
      <ul class="log-list" id="log"></ul>
    </div>
  </div>

  <script>
    var log = [];

    document.getElementById('msg').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') send();
    });

    function send() {
      var input  = document.getElementById('msg');
      var status = document.getElementById('status');
      var text   = input.value.trim();
      if (!text) return;

      status.className = '';
      status.innerText = 'Sending...';

      fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      })
      .then(r => r.json())
      .then(() => {
        status.className = 'ok';
        status.innerText = 'Sent! ESP32 will pick it up within 3 seconds.';
        addLog(text);
        input.value = '';
        setTimeout(() => { status.innerText = ''; }, 4000);
      })
      .catch(() => {
        status.className = 'err';
        status.innerText = 'Failed to send. Check your connection.';
      });
    }

    function addLog(text) {
      var now = new Date().toLocaleTimeString();
      log.unshift({ text, time: now });
      if (log.length > 10) log.pop();
      var list = document.getElementById('log');
      list.innerHTML = log.map(function(e) {
        return '<li><span>' + e.time + '</span>' + e.text + '</li>';
      }).join('');
    }
  </script>
</body>
</html>
